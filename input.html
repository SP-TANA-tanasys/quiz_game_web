<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クイズ作成</title>
<style>
  body {
    font-family: "Meiryo", sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    padding-top: 40px;
  }

  #container {
    width: 600px;
    margin: 0 auto;
    background: #1a1a1a;
    border: 4px solid #c9a34e;
    padding: 25px;
    box-shadow: 0 0 25px rgba(255,215,0,0.3);
  }

  h1 {
    color: #ffe9a3;
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
    padding-left: 5%;
  }

  input, textarea, select {
    width: 100%;
    max-width: 500px;
    padding: 10px;
    margin: 10px 0;
    border: 2px solid #fff;
    background: #333;
    color: #fff;
    box-sizing: border-box;
    font-size: 0.95rem;
  }

  #question, #multi-question {
    font-size: 0.95rem;
  }

  button {
    padding: 12px 20px;
    background: #0055cc;
    border: 2px solid #ffe9a3;
    color: #fff;
    cursor: pointer;
    font-size: 1.2rem;
    margin: 5px;
  }

  button:hover {
    background: #003f99;
  }
  
    .btn-back {
    background: #666;
    margin-top: 20px;
  }

  .btn-back:hover {
    background: #888;
  }


  #status {
    margin-top: 20px;
    padding: 10px;
    border-radius: 8px;
    min-height: 20px;
  }

  .success {
    background: #4caf50;
    color: #fff;
  }

  .error {
    background: #f44336;
    color: #fff;
  }
</style>
</head>
<body>

<div id="container">
  <h1>クイズ作成ページ</h1>

  <p id="level"></p>
  
  <label>問題タイプ</label>
  <select id="type" onchange="switchType()">
    <option value="ox">○×クイズ</option>
    <option value="multi">多択クイズ</option>
  </select>

  <div id="ox-form">
    <label>問題文</label>
    <textarea id="question" rows="4"></textarea>

    <label>正解（○なら true、×なら false）</label>
    <select id="ox-answer">
      <option value="true">○（true）</option>
      <option value="false">×（false）</option>
    </select>
  </div>

  <div id="multi-form" style="display:none;">
    <label>問題文</label>
    <textarea id="multi-question" rows="4"></textarea>

    <label>選択肢（改行で区切る）</label>
    <textarea id="choices" rows="4"></textarea>

    <label>正解の選択肢番号（1〜）</label>
    <input type="number" id="answer" min="1">
  </div>

  <button onclick="saveQuiz()">保存する</button>
  <button class="btn-back" onclick="goBack()">戻る</button>
  <div id="status"></div>
</div>

<script>

// 管理者チェック
if (localStorage.getItem("admin") !== "1") {
  alert("管理者のみアクセスできます");
  location.href = "login.html";
}
  // URL から難易度を取得
  const params = new URLSearchParams(location.search);
  const difficulty = params.get("difficulty") || "easy";

  const levelText = {
    easy: "やさしい",
    normal: "ふつう",
    hard: "むずかしい"
  };

  document.getElementById("level").textContent =
    `選択された難易度：${levelText[difficulty]}`;

  //フォーム切り替え処理
  function switchType() {
    const type = document.getElementById("type").value;

    if (type === "ox") {
      document.getElementById("ox-form").style.display = "block";
      document.getElementById("multi-form").style.display = "none";
    } else {
      document.getElementById("ox-form").style.display = "none";
      document.getElementById("multi-form").style.display = "block";
    }
  }

  // ステータスメッセージ表示
  function showStatus(message, isSuccess) {
    const statusEl = document.getElementById("status");
    statusEl.textContent = message;
    statusEl.className = isSuccess ? "success" : "error";
    setTimeout(() => {
      statusEl.textContent = "";
      statusEl.className = "";
    }, 3000);
  }

  // saveQuiz()
  async function saveQuiz() {
    const type = document.getElementById("type").value;

    let quizData;

    if (type === "ox") {
      const q = document.getElementById("question").value;
      const a = document.getElementById("ox-answer").value;

      if (!q.trim()) {
        showStatus("問題文を入力してください", false);
        return;
      }

      quizData = {
        type: "ox",
        question: q,
        answer: (a === "true"),
        createdAt: Date.now()
      };

    } else {
      const q = document.getElementById("multi-question").value;
      const c = document.getElementById("choices").value.split("\n").map(s => s.trim()).filter(s => s);
      const a = Number(document.getElementById("answer").value);

      if (!q.trim()) {
        showStatus("問題文を入力してください", false);
        return;
      }

      if (c.length === 0) {
        showStatus("選択肢を入力してください", false);
        return;
      }

      if (a < 1 || a > c.length) {
        showStatus("正解の選択肢番号が不正です", false);
        return;
      }

      quizData = {
        type: "multi",
        question: q,
        choices: c,
        answer: a,
        createdAt: Date.now()
      };
    }

    // サーバーに送信
    try {
      const response = await fetch("https://quiz-game-web.onrender.com/save-quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ difficulty, quizData })
      });

      const data = await response.json();

      if (data.ok) {
        showStatus(`✓ 保存完了！（全${data.total}問）`, true);
        // フォームをクリア
        if (type === "ox") {
          document.getElementById("question").value = "";
        } else {
          document.getElementById("multi-question").value = "";
          document.getElementById("choices").value = "";
          document.getElementById("answer").value = "";
        }
      } else {
        showStatus("保存に失敗しました: " + data.message, false);
      }
    } catch (e) {
      showStatus("エラーが発生しました: " + e.message, false);
    }
      }

    // 戻る
    function goBack() {
    location.href = "select.html";
  }
</script>

</body>
</html>
