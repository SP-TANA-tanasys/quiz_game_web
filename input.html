<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クイズ作成</title>
<style>
  body {
    font-family: "Meiryo", sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    padding-top: 40px;
  }

  #container {
    width: 600px;
    margin: 0 auto;
    background: #1a1a1a;
    border: 4px solid #c9a34e;
    padding: 25px;
    box-shadow: 0 0 25px rgba(255,215,0,0.3);
  }

  h1 {
    color: #ffe9a3;
    margin-bottom: 20px;
  }

  input, textarea, select {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 2px solid #fff;
    background: #333;
    color: #fff;
  }

  button {
    padding: 12px 20px;
    background: #0055cc;
    border: 2px solid #ffe9a3;
    color: #fff;
    cursor: pointer;
    font-size: 1.2rem;
  }

  button:hover {
    background: #003f99;
  }
</style>
</head>
<body>

<div id="container">
  <h1>クイズ作成ページ</h1>

  <p id="level"></p>
  
   <label>問題タイプ</label>
  <select id="type" onchange="switchType()">
    <option value="ox">○×クイズ</option>
    <option value="multi">多択クイズ</option>
  </select>

   <div id="ox-form">
    <label>問題文</label>
    <textarea id="question" rows="4"></textarea>

    <label>正解（○なら true、×なら false）</label>
    <select id="ox-answer">
      <option value="true">○（true）</option>
      <option value="false">×（false）</option>
    </select>
  </div>
   <div id="multi-form" style="display:none;">
    <label>問題文</label>
    <textarea id="multi-question" rows="4"></textarea>

    <label>選択肢（改行で区切る）</label>
    <textarea id="choices" rows="4"></textarea>

    <label>正解の選択肢番号（1〜）</label>
    <input type="number" id="answer" min="1">
  </div>

  <button onclick="saveQuiz()">保存する</button>
</div>
</div>

<script>

// 管理者チェック
if (localStorage.getItem("admin") !== "1") {
  alert("管理者のみアクセスできます");
  location.href = "login.html";
}
  // URL から難易度を取得
  const params = new URLSearchParams(location.search);
  const difficulty = params.get("difficulty") || "easy";

  const levelText = {
    easy: "やさしい",
    normal: "ふつう",
    hard: "むずかしい"
  };

  document.getElementById("level").textContent =
    `選択された難易度：${levelText[difficulty]}`;

  //フォーム切り替え処理
  function switchType() {
    const type = document.getElementById("type").value;

    if (type === "ox") {
      document.getElementById("ox-form").style.display = "block";
      document.getElementById("multi-form").style.display = "none";
    } else {
      document.getElementById("ox-form").style.display = "none";
      document.getElementById("multi-form").style.display = "block";
    }
  }

  //saveQuiz()
  function saveQuiz() {
    const type = document.getElementById("type").value;

    let quizData;

    if (type === "ox") {
      const q = document.getElementById("question").value;
      const a = document.getElementById("ox-answer").value;

      quizData = {
        difficulty,
        type: "ox",
        question: q,
        answer: (a === "true"),
        createdAt: Date.now()
      };

    } else {
      const q = document.getElementById("multi-question").value;
      const c = document.getElementById("choices").value.split("\n");
      const a = Number(document.getElementById("answer").value);

      quizData = {
        difficulty,
        type: "multi",
        question: q,
        choices: c,
        answer: a,
        createdAt: Date.now()
      };
    }

    const key = "quizzes_" + difficulty;
    const saved = JSON.parse(localStorage.getItem(key) || "[]");

    saved.push(quizData);
    localStorage.setItem(key, JSON.stringify(saved));

    const blob = new Blob([JSON.stringify(saved, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const aTag = document.createElement("a");
    aTag.href = url;
    aTag.download = difficulty + "_quiz.json";
    aTag.click();

    URL.revokeObjectURL(url);

    alert("JSONファイルを書き込みました！");
  }
</script>

</body>
</html>
