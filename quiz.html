<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="DQ10.css">
  <meta charset="UTF-8">
  <title>DQ10 ○×クイズ</title>
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #20232a;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    #quiz-container {
      max-width: 600px;
      margin: 0 auto;
      background: #282c34;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    h1 {
      margin-bottom: 10px;
    }
    #question {
      font-size: 1.2rem;
      margin: 20px 0;
    }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 30px;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    }
    .btn-true {
      background: #4caf50;
      color: #fff;
    }
    .btn-false {
      background: #f44336;
      color: #fff;
    }
    .btn-next {
      background: #2196f3;
      color: #fff;
      margin-top: 20px;
    }
    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
    }
    #result {
      margin-top: 15px;
      font-size: 1rem;
    }
    #score {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="quiz-container">
    <h1>DQ10 ○×クイズ</h1>
    <div id="question"></div>
    <button class="btn btn-true" id="btn-true">○</button>
    <button class="btn btn-false" id="btn-false">×</button>
    <div id="result"></div>
    <div id="score"></div>
    <button class="btn btn-next" id="btn-next" style="display:none;">次の問題へ</button>
  </div>

 <script>
  // 難易度を取得
  const params = new URLSearchParams(location.search);
  const difficulty = params.get("difficulty") || "easy";

  // サーバーからクイズデータを読み込む
  async function loadQuestions() {
    try {
      const response = await fetch(`https://quiz-game-web.onrender.com/get-quiz?difficulty=${difficulty}`);
      const data = await response.json();
      return data;
      alert("問題ファイルが読み込めませんでした");
      console.error(e);
      return [];
    }
  }

  let questions = [];
  let currentIndex = 0;
  let score = 0;
  let answered = false;

  const questionEl = document.getElementById("question");
  const resultEl = document.getElementById("result");
  const scoreEl = document.getElementById("score");
  const btnTrue = document.getElementById("btn-true");
  const btnFalse = document.getElementById("btn-false");
  const btnNext = document.getElementById("btn-next");

  // 多択用ボタン生成
  function createMultiButtons(choices, correctIndex) {
    const container = document.getElementById("quiz-container");

    // 既存の○×ボタンを消す
    btnTrue.style.display = "none";
    btnFalse.style.display = "none";

    // 既存の多択ボタンを削除
    const oldButtons = document.querySelectorAll(".multi-btn");
    oldButtons.forEach(btn => btn.remove());

    // 新しい多択ボタンを生成
    choices.forEach((choice, index) => {
      const btn = document.createElement("button");
      btn.textContent = choice;
      btn.className = "btn multi-btn";
      btn.onclick = () => checkAnswer(index + 1);
      container.insertBefore(btn, resultEl);
    });
  }

  // ○×ボタンを表示
  function showOXButtons() {
    btnTrue.style.display = "inline-block";
    btnFalse.style.display = "inline-block";

    // 多択ボタン削除
    const oldButtons = document.querySelectorAll(".multi-btn");
    oldButtons.forEach(btn => btn.remove());
  }

  function showQuestion() {
      if (questions.length === 0) {
      questionEl.textContent = "問題がまだ作成されていません";
      resultEl.textContent = "";
      scoreEl.textContent = "";
      btnTrue.style.display = "none";
      btnFalse.style.display = "none";
      btnNext.style.display = "none";
      return;
    }
    const q = questions[currentIndex];

    questionEl.textContent = `Q${currentIndex + 1}. ${q.question}`;
    resultEl.textContent = "";
    scoreEl.textContent = `スコア：${score} / ${questions.length}`;
    btnNext.style.display = "none";
    answered = false;

    if (q.type === "ox") {
      showOXButtons();
    } else {
      createMultiButtons(q.choices, q.answer);
    }
  }

  function checkAnswer(userAnswer) {
    if (answered) return;
    answered = true;

    const q = questions[currentIndex];
    let isCorrect = false;

    if (q.type === "ox") {
      isCorrect = (userAnswer === q.answer);
    } else {
      isCorrect = (userAnswer === q.answer);
    }

    if (isCorrect) {
      resultEl.textContent = "正解！";
      resultEl.style.color = "#4caf50";
      score++;
    } else {
      resultEl.textContent = "不正解…";
      resultEl.style.color = "#f44336";
    }

    scoreEl.textContent = `スコア：${score} / ${questions.length}`;

    if (currentIndex < questions.length - 1) {
      btnNext.style.display = "inline-block";
    } else {
      resultEl.textContent += " これで全問終了！";
    }
  }

  btnTrue.addEventListener("click", () => checkAnswer(true));
  btnFalse.addEventListener("click", () => checkAnswer(false));
  btnNext.addEventListener("click", () => {
    currentIndex++;
    showQuestion();
  });

  // サーバーから問題を読み込んで開始
  loadQuestions().then(data => {
    questions = data;
    showQuestion();
  });
</script>
</body>
</html>
