<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DQ10 ○×クイズ</title>
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #20232a;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    #quiz-container {
      max-width: 600px;
      margin: 0 auto;
      background: #282c34;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    h1 {
      margin-bottom: 10px;
    }
    #question {
      font-size: 1.2rem;
      margin: 20px 0;
    }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 30px;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    }
    .btn-true {
      background: #4caf50;
      color: #fff;
    }
    .btn-false {
      background: #f44336;
      color: #fff;
    }
    .btn-next {
      background: #2196f3;
      color: #fff;
      margin-top: 20px;
    }
    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
    }
    #result {
      margin-top: 15px;
      font-size: 1rem;
    }
    #score {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="quiz-container">
    <h1>DQ10 ○×クイズ</h1>
    <div id="question"></div>
    <button class="btn btn-true" id="btn-true">○</button>
    <button class="btn btn-false" id="btn-false">×</button>
    <div id="result"></div>
    <div id="score"></div>
    <button class="btn btn-next" id="btn-next" style="display:none;">次の問題へ</button>
  </div>

  <script>
    // ★ ここに問題を追加していく（true = ○, false = ×）
    const questions = [
      {
        text: "主人公の最初の種族は人間ではない。",
        answer: true
      },
      {
        text: "プクリポの初期村はプクレット村である。",
        answer: true
      },
      {
        text: "メガルーラストーンは最初から使える。",
        answer: false
      },
      {
        text: "バージョン2の舞台はレンダーシアである。",
        answer: true
      },
      {
        text: "アンルシアはエルフである。",
        answer: false
      }
      // ← ここにどんどんDQ10問題を追加していける
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById("question");
    const resultEl = document.getElementById("result");
    const scoreEl = document.getElementById("score");
    const btnTrue = document.getElementById("btn-true");
    const btnFalse = document.getElementById("btn-false");
    const btnNext = document.getElementById("btn-next");

    function showQuestion() {
      const q = questions[currentIndex];
      questionEl.textContent = `Q${currentIndex + 1}. ${q.text}`;
      resultEl.textContent = "";
      scoreEl.textContent = `スコア：${score} / ${questions.length}`;
      btnNext.style.display = "none";
      answered = false;
    }

    function checkAnswer(userAnswer) {
      if (answered) return; // 二重押し防止
      answered = true;

      const q = questions[currentIndex];
      const isCorrect = (userAnswer === q.answer);

      if (isCorrect) {
        resultEl.textContent = "正解！";
        resultEl.style.color = "#4caf50";
        score++;
      } else {
        resultEl.textContent = "不正解…";
        resultEl.style.color = "#f44336";
      }

      scoreEl.textContent = `スコア：${score} / ${questions.length}`;

      if (currentIndex < questions.length - 1) {
        btnNext.style.display = "inline-block";
      } else {
        // 最終問題
        btnNext.style.display = "none";
        resultEl.textContent += " これで全問終了！";
      }
    }

    btnTrue.addEventListener("click", () => checkAnswer(true));
    btnFalse.addEventListener("click", () => checkAnswer(false));
    btnNext.addEventListener("click", () => {
      currentIndex++;
      showQuestion();
    });

    // 最初の問題を表示
    showQuestion();
  </script>
</body>
</html>
