<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>難易度選択</title>
<style>
  body {
    font-family: "Meiryo", sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    padding-top: 60px;
  }

  #menu {
    width: 480px;
    margin: 0 auto;
    background: #1a1a1a;
    border: 4px solid #c9a34e;
    padding: 25px;
    box-shadow: 0 0 25px rgba(255,215,0,0.3);
  }

  h1 {
    color: #ffe9a3;
    margin-bottom: 20px;
  }

  h2 {
    font-size: 1rem;
    margin-top: 20px;
    color: #c9a34e;
  }

  .command {
    display: block;
    background: #1a1a1a;
    color: #fff;
    padding: 12px 20px;
    margin: 10px auto;
    width: 70%;
    text-align: left;
    border: 2px solid #fff;
    font-size: 1.3rem;
    cursor: pointer;
    text-shadow: 0 0 4px #000;
    transition: 0.1s;
  }

  .command:hover {
    background: #333;
    transform: scale(1.03);
  }

  .selected {
    background: #0055cc;
    border-color: #ffe9a3;
  }

  /* 管理者UI用 */
  #admin-area {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 2px solid #444;
  }

  .admin-command {
    display: block;
    background: #1a1a1a;
    color: #fff;
    padding: 10px 20px;
    margin: 10px auto;
    width: 70%;
    text-align: left;
    border: 2px solid #c9a34e;
    font-size: 1.1rem;
    cursor: pointer;
    text-shadow: 0 0 4px #000;
    transition: 0.1s;
  }

  .admin-command:hover {
    background: #333;
    transform: scale(1.03);
  }
</style>
</head>
<body>

<div id="menu">
  <h1>難易度を選んでください</h1>

  <div class="command" onclick="selectDifficulty('easy')">▶ やさしい</div>
  <div class="command" onclick="selectDifficulty('normal')">▶ ふつう</div>
  <div class="command" onclick="selectDifficulty('hard')">▶ むずかしい</div>
  <div class="command selected" onclick="startQuiz()">▶ はじめる</div>

  <!-- 管理者専用エリア -->
  <div id="admin-area">
    <h2>管理者メニュー</h2>
    <div class="admin-command" onclick="goCreateQuiz()">▶ 問題作成ページへ</div>
    <div class="admin-command" onclick="goListQuiz()">▶ 問題一覧を見る</div>
  </div>
</div>

<!-- 効果音 -->
<audio id="se" src="https://soundeffect-lab.info/sound/button/mp3/button01.mp3"></audio>

<script>
// 管理者ログインチェック
const isAdmin = localStorage.getItem("admin") === "1";
if (!isAdmin) {
  document.getElementById("admin-area").style.display = "none";
}

let selected = "easy";

function playSE() {
  const se = document.getElementById("se");
  se.currentTime = 0;
  se.play();
}

function selectDifficulty(level) {
  playSE();
  selected = level;

  const commands = document.querySelectorAll(".command");
  commands.forEach(cmd => cmd.classList.remove("selected"));

  if (level === "easy") commands[0].classList.add("selected");
  if (level === "normal") commands[1].classList.add("selected");
  if (level === "hard") commands[2].classList.add("selected");
}

function startQuiz() {
  playSE();
  location.href = "quiz.html?difficulty=" + selected;
}

function goCreateQuiz() {
  if (!isAdmin) {
    alert("管理者のみアクセスできます");
    location.href = "login.html";
    return;
  }
  playSE();
  location.href = "input.html?difficulty=" + selected;
}

function goListQuiz() {
  if (!isAdmin) {
    alert("管理者のみアクセスできます");
    location.href = "login.html";
    return;
  }
  playSE();
  location.href = "admin-list.html";
}
</script>

</body>
</html>
